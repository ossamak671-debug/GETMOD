<!DOCTYPE html>
<html lang="en">
<head>
    <title>GameOver - Home</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css?family=Rajdhani:300,400,500,600,700" rel="stylesheet">
    <script src="https://kit.fontawesome.com/22a24d17be.js" crossorigin="anonymous"></script>

    <link href="assets/vendor/magnific-popup/css/magnific-popup.css" rel="stylesheet">
    <link href="assets/vendor/slick/css/slick.css" rel="stylesheet">
    <link href="assets/vendor/nanoscroller/css/nanoscroller.css" rel="stylesheet">
    <link href="assets/vendor/fontawesome/css/brands.css" rel="stylesheet">
    <link href="assets/css/Home.css" rel="stylesheet">

    <style>
        @media (max-width: 768px) {
            /* 1. تنسيق الهيدر واللوجو */
            .header-home-page {
                flex-direction: column;
                height: auto !important;
                padding: 10px;
            }
            .header-logo-home img {
                width: 100px;
                height: 100px;
            }

            /* 2. تحويل القائمة العلوية لتناسب الشاشة */
            .nav-bar-home-page ul {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                padding: 0;
            }
            .nav-bar-home-page ul li {
                margin: 5px 10px;
            }

            /* 3. ضبط صندوق البحث */
            .centerbox {
                position: static !important;
                transform: none !important;
                width: 95%;
                margin: 10px auto;
            }
            .main-form-container form {
                display: flex;
                flex-direction: column;
            }
            .main-input {
                width: 100% !important;
                margin-bottom: 10px;
            }

            /* 4. تعديل قسم GETMOD */
            .text-background h1 {
                font-size: 3rem !important;
            }

            /* 5. قسم الصور والوصف (الأفضل لجعلها تحت بعضها) */
            .photo1-home {
                flex-direction: column;
                text-align: center;
            }
            .photo1-first img {
                width: 100% !important;
            }

            /* 6. شبكة الألعاب (Cards) */
            .cards {
                display: grid;
                grid-template-columns: 1fr !important; /* بطاقة واحدة في كل سطر */
                gap: 20px;
                padding: 10px;
            }
            .card {
                width: 90% !important;
                margin: 0 auto;
            }

            /* 7. قسم الصور الثلاثية (Fortnite, F1, Outriders) */
            .list2-3photo {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .photo1-list2, .photo2-list2, .photo3-list2 {
                width: 100% !important;
                margin-bottom: 30px;
            }
            .photo1-list2 img, .photo2-list2 img, .photo3-list2 img {
                width: 95% !important;
                height: auto !important;
            }

            /* 8. تذييل الصفحة (Footer) */
            .footer-cta .row {
                display: flex;
                flex-direction: column;
            }
            .single-cta {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body id="body2">
    <header class="header-home-page">
        <div class="header-logo-home">
            <a href="index.html"><img src="assets/img/logo-re1.png"  width="150px" height="150px" alt="game over"></a>
        </div>
        <nav class="nav-bar-home-page">
            <ul>
               <li><a href="#">HOME</a></li>
               <li><a href="#photo-home">TEAMS</a></li>
               <li><a href="#">ABOUT US</a></li>
               <li><a href="#">NEWS</a></li>
               <li><a href="#">CALL US</a></li>
               <li><a href="#">SHOP</a></li>
            </ul>
        </nav>
        <div class="centerbox">
            <div class="main-form-container">
                <form id="" class="" method="post">
                    <input type="text" class="main-input main-name" name="GAMES" value="Search by games" />
                    <input type="text" class="main-input main-location" name="DEVELOPERS" value="Search by Developers" />
                    <input id="main-submit" class="" type="submit" value="Search" />
                </form>
            </div>
        </div>
    </header>

    <div class="background-home-page">
        <div class="background-shadow-button">
            <div class="text-background">
                <p>We have come to</p>
                <h1>GETMOD</h1>
                <form action="#list1-topgames">
                  <button  class="button-background"><div></div></button>
                </form>
            </div>
        </div>
    </div>

    </body>
</html>
